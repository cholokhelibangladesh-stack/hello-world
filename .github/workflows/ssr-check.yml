name: SSR Build Verification

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ssr-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Lint (blocks module-scope browser globals in src/)
        run: bun run lint
      - name: SSR build + browser-global scan
        run: node scripts/check-ssr-build.mjs
