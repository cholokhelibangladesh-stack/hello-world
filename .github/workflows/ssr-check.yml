name: SSR Build Verification

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ssr-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: SSR leak scan + production build
        run: node scripts/check-ssr-build.mjs

